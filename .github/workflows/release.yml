name: Release

# Fires on every push to main (and can be run manually). The release is driven by
# the LIB version in projects/ngx-gooey-toast/package.json:
#   - if that version has no `vX.Y.Z` GitHub Release yet → build and cut one whose
#     body is the matching CHANGELOG.md section. (We key off the Release, not the
#     git tag: `git push --follow-tags` lands the tag together with the commit, so
#     the tag always exists by the time this workflow runs — checking the tag would
#     always skip the Release. The tag is reused as-is by action-gh-release.)
#   - if that version isn't on npm yet → publish it (uses the NPM_TOKEN secret).
# Both checks are independent, so a version can be (re)published even if it was
# already released. Commits that don't bump the version are a no-op.
#
# To cut a release: bump projects/ngx-gooey-toast/package.json, add the matching
# CHANGELOG.md section, commit, and push to main.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

# Never run two releases at once; let an in-flight run finish (don't cancel it).
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so we can tell whether this version already shipped.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Read library version
        id: ver
        run: echo "version=$(node -p "require('./projects/ngx-gooey-toast/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check whether this version already has a GitHub Release
        id: rel
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "v$VERSION already has a GitHub Release — will not re-create it."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "v$VERSION has no GitHub Release yet."
          fi

      - name: Check whether this version is already on npm
        id: npm
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          PUBLISHED="$(npm view "ngx-gooey-toast@$VERSION" version 2>/dev/null || true)"
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "ngx-gooey-toast@$VERSION already on npm — skipping publish."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "ngx-gooey-toast@$VERSION not on npm — will publish."
          fi

      - name: Install dependencies
        if: steps.rel.outputs.exists == 'false' || steps.npm.outputs.publish == 'true'
        run: npm ci

      - name: Build library
        if: steps.rel.outputs.exists == 'false' || steps.npm.outputs.publish == 'true'
        run: npm run build:lib

      # --- GitHub Release (only when the tag is new) -------------------------
      # Pass the version via env (not inline ${{ }} interpolation) so it can't
      # inject into the shell.
      - name: Extract release notes
        if: steps.rel.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: node scripts/extract-release-notes.mjs "v$VERSION" > RELEASE_NOTES.md

      - name: Create GitHub Release
        if: steps.rel.outputs.exists == 'false'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: v${{ steps.ver.outputs.version }}
          body_path: RELEASE_NOTES.md

      # --- npm publish (only when the version isn't on npm yet) --------------
      # NODE_AUTH_TOKEN is read from the npmrc that setup-node wrote; an npm
      # automation token bypasses 2FA/OTP.
      - name: Publish to npm
        if: steps.npm.outputs.publish == 'true'
        run: npm publish ./dist/ngx-gooey-toast --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
