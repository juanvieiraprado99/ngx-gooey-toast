name: Release

# Fires when a version tag is pushed (created locally by `npm run release`):
#   npm run release            # bumps lib version, regenerates CHANGELOG.md, commits, tags
#   git push --follow-tags origin main
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Build library
        run: npm run build:lib

      # Pass the tag via env (not inline ${{ }} interpolation) — tag names may
      # contain shell metacharacters, which would otherwise inject into `run:`.
      - name: Extract release notes
        env:
          TAG: ${{ github.ref_name }}
        run: node scripts/extract-release-notes.mjs "$TAG" > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md

      # Uncomment to also publish to npm (requires the NPM_TOKEN repo secret).
      # - name: Publish to npm
      #   run: npm publish ./dist/ngx-gooey-toast --access public
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
